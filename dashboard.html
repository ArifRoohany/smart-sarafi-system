<!DOCTYPE html>
<html lang="fa" dir="rtl" class="font-poppins">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Sarafi Dashboard</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    .active-link {
      background-color: hsl(209, 87%, 40%);
      color: white;
    }

    ::-webkit-scrollbar {
      height: 8px;
      width: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background-color: hsl(209, 87%, 40%);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }
  </style>

</head>

<body class="bg-sectionColor min-h-screen">

  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-white p-6 flex flex-col">

      <img src="images/logo.png" width="180" alt="Logo" class="mb-8">

      <nav class="flex flex-col gap-4 text-gray-800">

        <a href="#" class="flex items-center gap-3 p-3 rounded active-link">
          <i class="fa-solid fa-chart-line"></i>
          <span>داشبورد</span>
        </a>

        <a href="customers.html"
          class="flex items-center gap-3 p-3 rounded hover:bg-primaryColorLight hover:text-white transition">
          <i class="fa-solid fa-users"></i>
          <span>کاربران</span>
        </a>

        <a href="transactions.html"
          class="flex items-center gap-3 p-3 rounded hover:bg-primaryColorLight hover:text-white transition">
          <i class="fa-solid fa-money-bill-transfer"></i>
          <span>تراکنش‌ها</span>
        </a>

        <a href="#" class="flex items-center gap-3 p-3 rounded hover:bg-primaryColorLight hover:text-white transition">
          <i class="fa-solid fa-gear"></i>
          <span>تنظیمات</span>
        </a>

      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6">

      <!-- Navbar -->
      <div class="flex justify-between items-center mb-6">

        <h1 class="text-2xl font-semibold text-primaryColor">
          داشبورد
        </h1>

        <button
          class="flex items-center gap-2 border border-gray-300 text-primaryColor bg-white px-4 py-2 rounded-lg shadow">

          <i class="fa-solid fa-right-from-bracket"></i>
          خروج

        </button>

      </div>

      <!-- Cards -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">

        <div class="bg-white p-5 rounded-2xl shadow flex items-center justify-between hover:scale-105 transition">
          <div>
            <h2 class="text-primaryColor">تعداد کاربران</h2>
            <p class="text-2xl font-bold text-primaryColor">120</p>
          </div>
          <i class="fa-solid fa-users text-3xl text-primaryColor"></i>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow flex items-center justify-between hover:scale-105 transition">
          <div>
            <h2 class="text-primaryColor">تراکنش‌ها</h2>
            <p class="text-2xl font-bold text-primaryColor">340</p>
          </div>
          <i class="fa-solid fa-money-bill-transfer text-3xl text-primaryColor"></i>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow flex items-center justify-between hover:scale-105 transition">
          <div>
            <h2 class="text-primaryColor">موجودی کل</h2>
            <p class="text-2xl font-bold text-primaryColor">50,000$</p>
          </div>
          <i class="fa-solid fa-wallet text-3xl text-primaryColor"></i>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow flex items-center justify-between hover:scale-105 transition">
          <div>
            <h2 class="text-primaryColor">تراکنش‌های امروز</h2>
            <p class="text-2xl font-bold text-primaryColor">24</p>
          </div>
          <i class="fa-solid fa-calendar-day text-3xl text-primaryColor"></i>
        </div>

      </div>

      <!-- Chart -->
      <div class="bg-white p-5 rounded-2xl shadow mb-6" style="height:300px;">
        <canvas id="transactionChart"></canvas>
      </div>

    </main>
  </div>

  <script src="main.js"></script>

</body>

</html>
