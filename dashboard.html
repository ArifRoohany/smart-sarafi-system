<!DOCTYPE html>
<html lang="fa" dir="rtl" class="transition duration-300 font-poppins">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Sarafi Dashboard</title>

 <link rel="stylesheet" href="css/main.css">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-sectionColor dark:bg-darkBodyColor transition duration-300 min-h-screen">

  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-white dark:bg-darkSectionColor p-6 flex flex-col transition duration-300">
        <img src="images/logo.png" alt="">
      <!-- <h2 class="text-2xl font-bold font-Londrina mb-10 text-primaryColor dark:text-whiteColor">سامانه صرافی</h2> -->
      <nav class="flex flex-col gap-4 text-gray-800 dark:text-white">
        <a href="#" class="flex items-center gap-3 p-3 rounded hover:bg-primaryColorLight hover:text-white transition active-link">
          <i class="fa-solid fa-chart-line"></i> <span class="lang" data-fa="داشبورد" data-en="Dashboard">داشبورد</span>
        </a>
        <a href="#" class="flex items-center gap-3 p-3 rounded hover:bg-primaryColorLight hover:text-white transition">
          <i class="fa-solid fa-users"></i> <span class="lang" data-fa="کاربران" data-en="Users">کاربران</span>
        </a>
        <a href="#" class="flex items-center gap-3 p-3 rounded hover:bg-primaryColorLight hover:text-white transition">
          <i class="fa-solid fa-money-bill-transfer"></i> <span class="lang" data-fa="تراکنش‌ها" data-en="Transactions">تراکنش‌ها</span>
        </a>
        <a href="#" class="flex items-center gap-3 p-3 rounded hover:bg-primaryColorLight hover:text-white transition">
          <i class="fa-solid fa-gear"></i> <span class="lang" data-fa="تنظیمات" data-en="Settings">تنظیمات</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 transition duration-300">

      <!-- Navbar -->
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-semibold text-primaryColor dark:text-whiteColor  lang" data-fa="داشبورد" data-en="Dashboard">داشبورد</h1>
        <div class="flex items-center gap-4">
         <!-- Language Switch حرفه‌ای -->
<div class="relative w-32">
  <select id="langSwitch" class="appearance-none w-full px-4 py-2 pr-8 rounded-lg border border-gray-300 dark:border-gray-600 text-primaryColor dark:text-whiteColor bg-white dark:bg-darkSectionColor shadow-sm focus:outline-none transition">
    <option value="fa">فارسی</option>
    <option value="en">English</option>
  </select>
  <!-- آیکون فلش سفارشی -->
  <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700 dark:text-gray-300">
    <i class="fa-solid fa-chevron-down"></i>
  </div>
</div>

          <!-- Dark/Light Toggle -->
          <button id="themeToggle" class="w-12 h-12 flex items-center justify-center text-primaryColor dark:text-white border p-3 rounded-full">
            <i id="themeIcon" class="fa-solid fa-moon text-xl"></i>
          </button>

          <!-- دکمه خروج حرفه‌ای با آیکون -->
<button class="flex items-center gap-2rounded-lg border border-gray-300 dark:border-gray-600 text-primaryColor dark:text-whiteColor bg-white dark:bg-darkSectionColor px-4 py-2 rounded-lg shadow transition duration-300 font-medium lang" data-fa="خروج" data-en="Logout">
  <i class="fa-solid fa-right-from-bracket"></i>
  خروج
</button>
        </div>
      </div>

      <!-- Cards -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
        <div class="bg-white dark:bg-darkSectionColor p-5 rounded-2xl shadow flex items-center justify-between transition">
          <div>
            <h2 class="text-primaryColor dark:text-whiteColor lang" data-fa="تعداد کاربران" data-en="Users">تعداد کاربران</h2>
            <p class="text-2xl font-bold text-primaryColor dark:text-whiteColor">120</p>
          </div>
          <i class="fa-solid fa-users text-3xl text-primaryColor dark:text-primaryColorLight"></i>
        </div>
        <div class="bg-white dark:bg-darkSectionColor p-5 rounded-2xl shadow flex items-center justify-between transition">
          <div>
            <h2 class="text-primaryColor dark:text-whiteColor lang" data-fa="تراکنش‌ها" data-en="Transactions">تراکنش‌ها</h2>
            <p class="text-2xl font-bold text-primaryColor dark:text-whiteColor">340</p>
          </div>
          <i class="fa-solid fa-money-bill-transfer text-3xl text-primaryColor dark:text-primaryColorLight"></i>
        </div>
        <div class="bg-white dark:bg-darkSectionColor p-5 rounded-2xl shadow flex items-center justify-between transition">
          <div>
            <h2 class="text-primaryColor dark:text-whiteColor lang" data-fa="موجودی کل" data-en="Total Balance">موجودی کل</h2>
            <p class="text-2xl font-bold text-primaryColor dark:text-whiteColor">50,000$</p>
          </div>
          <i class="fa-solid fa-wallet text-3xl text-primaryColor dark:text-primaryColorLight"></i>
        </div>
        <div class="bg-white dark:bg-darkSectionColor p-5 rounded-2xl shadow flex items-center justify-between transition">
          <div>
            <h2 class="text-primaryColor dark:text-whiteColor lang" data-fa="تراکنش‌های امروز" data-en="Today Transactions">تراکنش‌های امروز</h2>
            <p class="text-2xl font-bold text-primaryColor dark:text-whiteColor">24</p>
          </div>
          <i class="fa-solid fa-calendar-day text-3xl text-primaryColor dark:text-primaryColorLight"></i>
        </div>
      </div>

      <!-- Chart.js -->
      <div class="bg-white dark:bg-darkSectionColor p-5 rounded-2xl shadow mb-6 transition">
        <canvas id="transactionChart" class="w-full h-64"></canvas>
      </div>

      <!-- Transactions Table -->
      <div class="bg-white dark:bg-darkSectionColor p-5 rounded-2xl shadow transition">
        <h2 class="text-xl font-semibold mb-4 text-primaryColor dark:text-whiteColor lang" data-fa="تراکنش‌های اخیر" data-en="Recent Transactions">تراکنش‌های اخیر</h2>
        <div class="overflow-x-auto">
          <table class="min-w-full table-auto">
            <thead class="bg-primaryColorLight dark:bg-darkBodyColor">
              <tr>
                <th class="px-4 py-2 text-primaryColor dark:text-whiteColor lang" data-fa="ID" data-en="ID">ID</th>
                <th class="px-4 py-2 text-primaryColor dark:text-whiteColor lang" data-fa="کاربر" data-en="User">کاربر</th>
                <th class="px-4 py-2 text-primaryColor dark:text-whiteColor lang" data-fa="مبلغ" data-en="Amount">مبلغ</th>
                <th class="px-4 py-2 text-primaryColor dark:text-whiteColor lang" data-fa="نوع" data-en="Type">نوع</th>
                <th class="px-4 py-2 text-primaryColor dark:text-whiteColor lang" data-fa="تاریخ" data-en="Date">تاریخ</th>
              </tr>
            </thead>
            <tbody>
              <tr class="border-b border-gray-200 dark:border-gray-700">
                <td class="px-4 py-2 text-primaryColor dark:text-whiteColor">1</td>
                <td class="px-4 py-2 text-primaryColor dark:text-whiteColor">Arif Roohani</td>
                <td class="px-4 py-2 text-primaryColor dark:text-whiteColor">1000$</td>
                <td class="px-4 py-2 text-primaryColor dark:text-whiteColor lang" data-fa="خرید" data-en="Buy">خرید</td>
                <td class="px-4 py-2 text-primaryColor dark:text-whiteColor">10-03-2026</td>
              </tr>
              <tr class="border-b border-gray-200 dark:border-gray-700">
                <td class="px-4 py-2 text-primaryColor dark:text-whiteColor">2</td>
                <td class="px-4 py-2 text-primaryColor dark:text-whiteColor">Ahmad</td>
                <td class="px-4 py-2 text-primaryColor dark:text-whiteColor">500$</td>
                <td class="px-4 py-2 text-primaryColor dark:text-whiteColor lang" data-fa="فروش" data-en="Sell">فروش</td>
                <td class="px-4 py-2 text-primaryColor dark:text-whiteColor">10-03-2026</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

<script>
  // Chart.js Labels & Title برای دو زبان
  const chartLabels = {
    fa: ['شنبه','یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنجشنبه','جمعه'],
    en: ['Sat','Sun','Mon','Tue','Wed','Thu','Fri']
  };
  const chartTitle = { fa: 'تراکنش‌ها', en: 'Transactions' };

  // رنگ‌ها برای لایت و دارک مود
  const chartColors = {
    light: {
      borderColor: 'hsl(209,87%,21%)', // primaryColor
      backgroundColor: 'rgba(29,78,216,0.2)',
      textColor: 'hsl(209,87%,21%)'
    },
    dark: {
      borderColor: '#ffffff', // whiteColor
      backgroundColor: 'rgba(255,255,255,0.2)',
      textColor: '#ffffff'
    }
  };

  // تشخیص حالت فعلی
  const currentTheme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
  let colors = chartColors[currentTheme];

  // Chart.js
  const ctx = document.getElementById('transactionChart').getContext('2d');
  let transactionChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: chartLabels.fa, // پیش‌فرض فارسی
      datasets: [{
        label: chartTitle.fa,
        data: [12,19,8,14,20,17,22],
        borderColor: colors.borderColor,
        backgroundColor: colors.backgroundColor,
        tension: 0.4
      }]
    },
    options: {
      responsive:true,
      plugins:{ legend:{ labels:{ color: colors.textColor } } },
      scales:{ 
        x:{ ticks:{ color: colors.textColor }, grid:{ color:'rgba(0,0,0,0.05)' } },
        y:{ ticks:{ color: colors.textColor }, grid:{ color:'rgba(0,0,0,0.05)' } } 
      }
    }
  });

  // Dark/Light Mode Toggle با آپدیت چارت
  const themeToggle = document.getElementById('themeToggle');
  const themeIcon = document.getElementById('themeIcon');
  themeToggle.addEventListener('click', () => {
    document.documentElement.classList.toggle('dark');
    themeIcon.classList.toggle('fa-moon');
    themeIcon.classList.toggle('fa-sun');

    // آپدیت رنگ‌ها بعد از تغییر مود
    const newTheme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
    colors = chartColors[newTheme];

    transactionChart.data.datasets[0].borderColor = colors.borderColor;
    transactionChart.data.datasets[0].backgroundColor = colors.backgroundColor;
    transactionChart.options.plugins.legend.labels.color = colors.textColor;
    transactionChart.options.scales.x.ticks.color = colors.textColor;
    transactionChart.options.scales.y.ticks.color = colors.textColor;
    transactionChart.update();
  });

  // Language Switch با بروزرسانی Chart.js
  const langSwitch = document.getElementById('langSwitch');
  langSwitch.addEventListener('change', () => {
    const lang = langSwitch.value;
    document.querySelectorAll('.lang').forEach(el => {
      el.textContent = el.dataset[lang === 'fa' ? 'fa' : 'en'];
    });

    // بروزرسانی Chart.js
    transactionChart.data.labels = chartLabels[lang];
    transactionChart.data.datasets[0].label = chartTitle[lang];
    transactionChart.update();
  });

  // Active Link Highlight
  const sidebarLinks = document.querySelectorAll('aside nav a');
  sidebarLinks.forEach(link => {
    link.addEventListener('click', () => {
      sidebarLinks.forEach(l => l.classList.remove('bg-primaryColorLight','text-white'));
      link.classList.add('bg-primaryColorLight','text-white');
    });
  });
</script>

  <style>
    /* Active Link */
    .active-link {
      background-color: hsl(209, 87%, 40%);
      color: white;
    }
  </style>

</body>
</html>
