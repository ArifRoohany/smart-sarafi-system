<!DOCTYPE html>
<html lang="fa" dir="rtl" class="transition duration-300 font-poppins">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Sarafi Dashboard</title>

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  /* Active Link */
  .active-link {
    background-color: hsl(209,87%,40%);
    color: white;
  }

  /* Scrollbar for table */
  ::-webkit-scrollbar {
    height: 8px;
    width: 8px;
  }
  ::-webkit-scrollbar-thumb {
    background-color: hsl(209,87%,40%);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
</style>
</head>

<body class="bg-sectionColor dark:bg-darkBodyColor transition duration-300 min-h-screen">

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-white dark:bg-darkSectionColor p-6 flex flex-col transition duration-300">
    <img src="images/logo.png" width="180" alt="Logo" class="mb-8">
    <nav class="flex flex-col gap-4 text-gray-800 dark:text-white">
      <a href="#" class="flex items-center gap-3 p-3 rounded transition active-link">
        <i class="fa-solid fa-chart-line"></i>
        <span class="lang" data-fa="داشبورد" data-en="Dashboard">داشبورد</span>
      </a>
      <a href="customers.html" class="flex items-center gap-3 p-3 rounded hover:bg-primaryColorLight hover:text-white transition">
        <i class="fa-solid fa-users"></i>
        <span class="lang" data-fa="کاربران" data-en="Users">کاربران</span>
      </a>
      <a href="transactions.html" class="flex items-center gap-3 p-3 rounded hover:bg-primaryColorLight hover:text-white transition">
        <i class="fa-solid fa-money-bill-transfer"></i>
        <span class="lang" data-fa="تراکنش‌ها" data-en="Transactions">تراکنش‌ها</span>
      </a>
      <a href="#" class="flex items-center gap-3 p-3 rounded hover:bg-primaryColorLight hover:text-white transition">
        <i class="fa-solid fa-gear"></i>
        <span class="lang" data-fa="تنظیمات" data-en="Settings">تنظیمات</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 p-6 transition duration-300">

    <!-- Navbar -->
    <div class="flex justify-between items-center mb-6 flex-wrap gap-4">
      <h1 class="text-2xl font-semibold text-primaryColor dark:text-whiteColor lang" data-fa="داشبورد" data-en="Dashboard">داشبورد</h1>
      <div class="flex items-center gap-4 flex-wrap">

        <!-- Language Switch -->
        <div class="relative w-32">
          <select id="langSwitch" class="appearance-none w-full px-4 py-2 pr-8 rounded-lg border border-gray-300 dark:border-gray-600 text-primaryColor dark:text-whiteColor bg-white dark:bg-darkSectionColor shadow-sm focus:outline-none transition">
            <option value="fa">فارسی</option>
            <option value="en">English</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700 dark:text-gray-300">
            <i class="fa-solid fa-chevron-down"></i>
          </div>
        </div>

        <!-- Theme Toggle -->
        <button id="themeToggle" class="w-12 h-12 flex items-center justify-center text-primaryColor dark:text-white border p-3 rounded-full transition">
          <i id="themeIcon" class="fa-solid fa-moon text-xl"></i>
        </button>

        <!-- Logout Button -->
        <button class="flex items-center gap-2 border border-gray-300 dark:border-gray-600 text-primaryColor dark:text-whiteColor bg-white dark:bg-darkSectionColor px-4 py-2 rounded-lg shadow transition duration-300 font-medium lang" data-fa="خروج" data-en="Logout">
          <i class="fa-solid fa-right-from-bracket"></i>
          خروج
        </button>
      </div>
    </div>

    <!-- Dashboard Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
      <div class="bg-white dark:bg-darkSectionColor p-5 rounded-2xl shadow flex items-center justify-between transition hover:scale-105">
        <div>
          <h2 class="text-primaryColor dark:text-whiteColor lang" data-fa="تعداد کاربران" data-en="Users">تعداد کاربران</h2>
          <p class="text-2xl font-bold text-primaryColor dark:text-whiteColor">120</p>
        </div>
        <i class="fa-solid fa-users text-3xl text-primaryColor dark:text-primaryColorLight"></i>
      </div>

      <div class="bg-white dark:bg-darkSectionColor p-5 rounded-2xl shadow flex items-center justify-between transition hover:scale-105">
        <div>
          <h2 class="text-primaryColor dark:text-whiteColor lang" data-fa="تراکنش‌ها" data-en="Transactions">تراکنش‌ها</h2>
          <p class="text-2xl font-bold text-primaryColor dark:text-whiteColor">340</p>
        </div>
        <i class="fa-solid fa-money-bill-transfer text-3xl text-primaryColor dark:text-primaryColorLight"></i>
      </div>

      <div class="bg-white dark:bg-darkSectionColor p-5 rounded-2xl shadow flex items-center justify-between transition hover:scale-105">
        <div>
          <h2 class="text-primaryColor dark:text-whiteColor lang" data-fa="موجودی کل" data-en="Total Balance">موجودی کل</h2>
          <p class="text-2xl font-bold text-primaryColor dark:text-whiteColor">50,000$</p>
        </div>
        <i class="fa-solid fa-wallet text-3xl text-primaryColor dark:text-primaryColorLight"></i>
      </div>

      <div class="bg-white dark:bg-darkSectionColor p-5 rounded-2xl shadow flex items-center justify-between transition hover:scale-105">
        <div>
          <h2 class="text-primaryColor dark:text-whiteColor lang" data-fa="تراکنش‌های امروز" data-en="Today Transactions">تراکنش‌های امروز</h2>
          <p class="text-2xl font-bold text-primaryColor dark:text-whiteColor">24</p>
        </div>
        <i class="fa-solid fa-calendar-day text-3xl text-primaryColor dark:text-primaryColorLight"></i>
      </div>
    </div>

    <!-- Chart Section -->
    <div class="bg-white dark:bg-darkSectionColor p-5 rounded-2xl shadow mb-6 transition" style="height:300px;">
      <canvas id="transactionChart" class="w-full h-full"></canvas>
    </div>

    <!-- Transactions Table -->
    <div class="bg-white dark:bg-darkSectionColor p-5 rounded-2xl shadow transition">
      <h2 class="text-xl font-semibold mb-4 text-primaryColor dark:text-whiteColor lang" data-fa="تراکنش‌های اخیر" data-en="Recent Transactions">تراکنش‌های اخیر</h2>
      <div class="overflow-x-auto">
        <table class="min-w-full table-auto text-sm">
          <thead class="bg-primaryColor dark:bg-primaryColor">
            <tr>
              <th class="px-4 py-2 text-whiteColor dark:text-whiteColor lang" data-fa="ID" data-en="ID">ID</th>
              <th class="px-4 py-2 text-whiteColor dark:text-whiteColor lang" data-fa="کاربر" data-en="User">کاربر</th>
              <th class="px-4 py-2 text-whiteColor dark:text-whiteColor lang" data-fa="مبلغ" data-en="Amount">مبلغ</th>
              <th class="px-4 py-2 text-whiteColor dark:text-whiteColor lang" data-fa="نوع" data-en="Type">نوع</th>
              <th class="px-4 py-2 text-whiteColor dark:text-whiteColor lang" data-fa="تاریخ" data-en="Date">تاریخ</th>
            </tr>
          </thead>
          <tbody>
            <tr class="border-b border-gray-200 dark:border-gray-700">
              <td class="px-4 py-2 text-primaryColor dark:text-whiteColor">1</td>
              <td class="px-4 py-2 text-primaryColor dark:text-whiteColor">Arif Roohani</td>
              <td class="px-4 py-2 text-primaryColor dark:text-whiteColor">1000$</td>
              <td class="px-4 py-2 text-primaryColor dark:text-whiteColor lang" data-fa="خرید" data-en="Buy">خرید</td>
              <td class="px-4 py-2 text-primaryColor dark:text-whiteColor">10-03-2026</td>
            </tr>
            <tr class="border-b border-gray-200 dark:border-gray-700">
              <td class="px-4 py-2 text-primaryColor dark:text-whiteColor">2</td>
              <td class="px-4 py-2 text-primaryColor dark:text-whiteColor">Ahmad</td>
              <td class="px-4 py-2 text-primaryColor dark:text-whiteColor">500$</td>
              <td class="px-4 py-2 text-primaryColor dark:text-whiteColor lang" data-fa="فروش" data-en="Sell">فروش</td>
              <td class="px-4 py-2 text-primaryColor dark:text-whiteColor">10-03-2026</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script>
  // Chart.js setup دقیقاً مثل Customers
  const ctx = document.getElementById('transactionChart').getContext('2d');

  const chartColors = {
    light: {
      borderColor: 'hsl(209,87%,40%)',
      backgroundColor: 'rgba(29,78,216,0.2)',
      textColor: 'hsl(209,87%,20%)',
      gridColor: 'rgba(0,0,0,0.05)'
    },
    dark: {
      borderColor: '#60a5fa',
      backgroundColor: 'rgba(96,165,250,0.2)',
      textColor: '#ffffff',
      gridColor: 'rgba(255,255,255,0.1)'
    }
  };

  let customerChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['شنبه','یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنجشنبه','جمعه'],
      datasets: [{
        label: 'تراکنش‌ها',
        data: [12, 15, 8, 20, 10, 7, 5],
        borderColor: chartColors.light.borderColor,
        backgroundColor: chartColors.light.backgroundColor,
        tension: 0.4,
        fill: true,
        pointBackgroundColor: chartColors.light.borderColor,
        pointBorderColor: chartColors.light.borderColor,
        pointRadius: 5
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: chartColors.light.textColor, font: {size:14} } }
      },
      scales: {
        x: { ticks: { color: chartColors.light.textColor, font:{size:12} }, grid:{color:chartColors.light.gridColor} },
        y: { ticks: { color: chartColors.light.textColor, font:{size:12} }, grid:{color:chartColors.light.gridColor} }
      }
    }
  });

  // Dark/Light Toggle
  const themeToggle = document.getElementById('themeToggle');
  const themeIcon = document.getElementById('themeIcon');
  themeToggle.addEventListener('click', () => {
    document.documentElement.classList.toggle('dark');
    themeIcon.classList.toggle('fa-moon');
    themeIcon.classList.toggle('fa-sun');
    updateChartColors();
  });

  function updateChartColors() {
    const theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
    const colors = chartColors[theme];

    customerChart.data.datasets[0].borderColor = colors.borderColor;
    customerChart.data.datasets[0].backgroundColor = colors.backgroundColor;
    customerChart.data.datasets[0].pointBackgroundColor = colors.borderColor;
    customerChart.data.datasets[0].pointBorderColor = colors.borderColor;

    customerChart.options.plugins.legend.labels.color = colors.textColor;
    customerChart.options.scales.x.ticks.color = colors.textColor;
    customerChart.options.scales.x.grid.color = colors.gridColor;
    customerChart.options.scales.y.ticks.color = colors.textColor;
    customerChart.options.scales.y.grid.color = colors.gridColor;

    customerChart.update();
  }

  // Language Switch
  const langSwitch = document.getElementById('langSwitch');
  langSwitch.addEventListener('change', () => { updateLanguage(langSwitch.value); });

  const searchInput = document.getElementById('customerSearch');
  function updateLanguage(lang) {
    document.querySelectorAll('.lang').forEach(el => { el.textContent = el.dataset[lang]; });

    if(lang==='fa'){
      customerChart.data.labels = ['شنبه','یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنجشنبه','جمعه'];
      customerChart.data.datasets[0].label = 'تراکنش‌ها';
    }else{
      customerChart.data.labels = ['Sat','Sun','Mon','Tue','Wed','Thu','Fri'];
      customerChart.data.datasets[0].label = 'Transactions';
    }
    customerChart.update();
  }

  // Sidebar Active Link Highlight
  const sidebarLinks = document.querySelectorAll('aside nav a');
  sidebarLinks.forEach(link => {
    link.addEventListener('click', () => {
      sidebarLinks.forEach(l => l.classList.remove('bg-primaryColorLight','text-white'));
      link.classList.add('bg-primaryColorLight','text-white');
    });
  });
</script>

</body>
</html>
