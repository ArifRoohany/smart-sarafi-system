<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مدیریت تراکنش‌ها | Smart Sarafi</title>

<link rel="stylesheet" href="css/main.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

.active-link{
background-color:hsl(209,87%,40%);
color:white;
}

/* Modal */

.modal-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:50;
}

.modal{
background:white;
border-radius:10px;
width:90%;
max-width:500px;
padding:20px;
}

.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.modal-body{
margin-top:10px;
}

</style>

</head>


<body class="bg-sectionColor min-h-screen">

<div class="flex min-h-screen">

<!-- Sidebar -->

<aside class="w-64 bg-white p-6 flex flex-col">

<img src="images/logo.png" width="200">

<nav class="flex flex-col gap-4 mt-10 text-gray-800">

<a href="dashboard.html"
class="flex items-center gap-3 p-3 rounded hover:bg-primaryColorLight hover:text-white">

<i class="fa-solid fa-chart-line"></i>
<span>داشبورد</span>

</a>


<a href="customers.html"
class="flex items-center gap-3 p-3 rounded hover:bg-primaryColorLight hover:text-white">

<i class="fa-solid fa-users"></i>
<span>کاربران</span>

</a>


<a href="transactions.html"
class="flex items-center gap-3 p-3 rounded active-link">

<i class="fa-solid fa-money-bill-transfer"></i>
<span>تراکنش‌ها</span>

</a>


<a href="#"
class="flex items-center gap-3 p-3 rounded hover:bg-primaryColorLight hover:text-white">

<i class="fa-solid fa-gear"></i>
<span>تنظیمات</span>

</a>

</nav>

</aside>


<!-- Main -->

<main class="flex-1 p-6">

<!-- Navbar -->

<div class="flex justify-between items-center mb-6">

<h1 class="text-2xl font-semibold text-primaryColor">

مدیریت تراکنش‌ها

</h1>


<button
class="flex items-center gap-2 border border-gray-300 text-primaryColor bg-white px-4 py-2 rounded-lg shadow">

<i class="fa-solid fa-right-from-bracket"></i>
خروج

</button>

</div>


<!-- Cards -->

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">

<div class="bg-white p-5 rounded-2xl shadow flex justify-between">

<div>
<h2 class="text-primaryColor">کل تراکنش‌ها</h2>
<p class="text-2xl font-bold text-primaryColor">245</p>
</div>

<i class="fa-solid fa-money-bill-transfer text-3xl text-primaryColor"></i>

</div>


<div class="bg-white p-5 rounded-2xl shadow flex justify-between">

<div>
<h2 class="text-primaryColor">موفق</h2>
<p class="text-2xl font-bold text-green-500">198</p>
</div>

<i class="fa-solid fa-check text-3xl text-green-500"></i>

</div>


<div class="bg-white p-5 rounded-2xl shadow flex justify-between">

<div>
<h2 class="text-primaryColor">ناموفق</h2>
<p class="text-2xl font-bold text-red-500">47</p>
</div>

<i class="fa-solid fa-xmark text-3xl text-red-500"></i>

</div>


<div class="bg-white p-5 rounded-2xl shadow flex justify-between">

<div>
<h2 class="text-primaryColor">امروز</h2>
<p class="text-2xl font-bold text-purple-500">12</p>
</div>

<i class="fa-solid fa-calendar-day text-3xl text-purple-500"></i>

</div>

</div>


<!-- Chart -->

<div class="bg-white p-5 rounded-2xl shadow mb-6" style="height:300px">

<canvas id="transactionChart"></canvas>

</div>


<!-- Search + Add -->

<div class="flex flex-col md:flex-row md:justify-between gap-4 mb-6">

<div class="relative w-full md:w-80">

<input type="text"
placeholder="جستجوی تراکنش..."
class="w-full border border-gray-300 rounded-lg px-4 py-2">

</div>


<button id="addTransactionBtn"
class="bg-primaryColor hover:bg-primaryColorLight text-white px-5 py-2 rounded-lg flex items-center gap-2">

<i class="fa-solid fa-plus"></i>
افزودن تراکنش

</button>

</div>


<!-- Table -->

<div class="bg-white rounded-sm shadow overflow-x-auto">

<table class="min-w-full text-sm">

<thead class="bg-primaryColor text-white">

<tr>

<th class="px-6 py-3">ID</th>
<th class="px-6 py-3">فرستنده</th>
<th class="px-6 py-3">گیرنده</th>
<th class="px-6 py-3">ارز</th>
<th class="px-6 py-3">مقدار</th>
<th class="px-6 py-3">وضعیت</th>
<th class="px-6 py-3">تاریخ</th>
<th class="px-6 py-3">عملیات</th>

</tr>

</thead>


<tbody>

<tr class="border-b">

<td class="px-6 py-4">1</td>
<td class="px-6 py-4">Ahmad Khan</td>
<td class="px-6 py-4">Ali Reza</td>
<td class="px-6 py-4">USD</td>
<td class="px-6 py-4">$500</td>

<td class="px-6 py-4">

<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs">

موفق

</span>

</td>

<td class="px-6 py-4">2026-03-10</td>

<td class="px-6 py-4 flex gap-3">

<button class="text-blue-500">
<i class="fa-solid fa-eye"></i>
</button>

<button class="text-red-500">
<i class="fa-solid fa-trash"></i>
</button>

</td>

</tr>

</tbody>

</table>

</div>

</main>

</div>


<!-- Modal -->

<div id="addTransactionModal" class="modal-overlay">

<div class="modal">

<div class="modal-header">

<h2>افزودن تراکنش جدید</h2>

<button id="closeModal" class="text-red-500 text-xl">
&times;
</button>

</div>


<div class="modal-body">

<div class="flex flex-col gap-4">

<input type="text" placeholder="فرستنده" class="border px-4 py-2 rounded-lg">

<input type="text" placeholder="گیرنده" class="border px-4 py-2 rounded-lg">

<input type="text" placeholder="ارز" class="border px-4 py-2 rounded-lg">

<input type="number" placeholder="مقدار" class="border px-4 py-2 rounded-lg">


<select class="border px-4 py-2 rounded-lg">

<option>موفق</option>
<option>ناموفق</option>

</select>


<button id="saveTransaction"
class="bg-primaryColor hover:bg-primaryColorLight text-white px-5 py-2 rounded-lg">

ذخیره

</button>

</div>

</div>

</div>

</div>


<script src="main.js"></script>

</body>
</html>
