<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>
<link rel="stylesheet" href="css/main.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body 
class="min-h-screen flex items-center justify-center bg-cover bg-center relative"
style="background-image: url('images/money.png');">

<!-- Glass overlay -->
<div class="absolute inset-0 backdrop-blur-md bg-black/30"></div>

<div class="relative">

<!-- Card -->
<div class="bg-white/90 border border-white/40 
rounded-[40px] shadow-2xl w-[360px] pt-16 pb-0 overflow-hidden">

<!-- Avatar -->
<div class="absolute left-1/2 -translate-x-1/2 -top-12">

<div class="w-24 h-24 bg-primary rounded-full flex items-center justify-center shadow-lg">

<i class="fa-solid fa-user text-white text-4xl"></i>

</div>

</div>

<div class="px-8 pb-6">

<!-- Email -->
<div class="flex items-center gap-3 mb-4">

<span class="text-primary text-xl">
<i class="fa-solid fa-envelope"></i>
</span>

<input
type="email"
placeholder="Email"
class="flex-1 bg-white text-gray-700 px-4 py-2 rounded-full outline-none"
/>

</div>

<!-- Password -->
<div class="flex items-center gap-3 mb-5">

<span class="text-primary text-xl">
<i class="fa-solid fa-lock"></i>
</span>

<input
type="password"
placeholder="Password"
class="flex-1 bg-white text-gray-700 px-4 py-2 rounded-full outline-none"
/>

</div>

<!-- Remember -->
<div class="flex items-center justify-between mb-6">

<label class="flex items-center gap-2 cursor-pointer group">

<input 
type="checkbox"
class="w-4 h-4 rounded border-gray-300 text-primary 
focus:ring-2 focus:ring-primary transition"
/>

<span class="text-sm text-gray-600 group-hover:text-gray-800 transition">
Remember me
</span>

</label>

<a 
href="#" 
class="text-sm text-primary font-medium hover:text-primary/80 transition">
Forgot Password?
</a>

</div>

</div>

<!-- LOGIN Button -->
<a href="dashboard.html">
<button class="w-full bg-blue-800 text-white text-xl font-bold py-4 hover:bg-blue-900 transition">

LOGIN

</button>
</a>

</div>

</div>

</body>
</html>
