<!DOCTYPE html>
<html lang="fa" dir="rtl" class="transition duration-300">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Sarafi Management System | سامانه مدیریت صرافی هوشمند</title>

<link rel="stylesheet" href="css/main.css">

<!-- Fontawesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* Glass Morphism */
.glass-form{
background: rgba(255,255,255,0.15);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
border:1px solid rgba(255,255,255,0.3);
}

.dark .glass-form{
background: rgba(30,41,59,0.6);
border:1px solid rgba(255,255,255,0.08);
}

</style>

</head>

<body class="bg-sectionColor dark:bg-darkBodyColor min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-6xl bg-white dark:bg-darkSectionColor shadow-2xl rounded-2xl overflow-hidden grid md:grid-cols-2">

<!-- LEFT SIDE -->
<div class="bg-primaryColor text-white p-10 flex flex-col justify-center items-center text-center">

<div class="mb-6 flex items-center justify-center">
<img src="images/logo.png" width="260" alt="System Logo">
</div>

<h1 id="titleSystem" class="text-3xl font-bold mb-4">
سیستم صرافی هوشمند
</h1>

<p id="bankText" class="mb-6 text-lg">
تایید شده د افغانستان بانک
</p>

<h2 id="welcomeText" class="text-xl font-semibold mb-4">
خوش آمدید!
</h2>

<p id="descText" class="leading-relaxed">
برای دسترسی به حساب کاربری خود وارد شوید و داشبورد خود را مدیریت کنید.
</p>

</div>

<!-- RIGHT SIDE -->
<div class="p-10 glass-form">

<!-- Top Controls -->
<div class="flex justify-between items-center mb-6">

<select id="langSwitch"
class="border px-3 py-1 rounded dark:bg-slate-700 dark:text-white">

<option value="fa">Persian</option>
<option value="en">English</option>

</select>

<button id="themeToggle"
class="w-12 h-12 text-lg flex items-center justify-center text-primaryColor dark:text-white border p-3 rounded-full">

<i id="themeIcon" class="fa-solid fa-moon text-xl"></i>

</button>

</div>

<!-- Login Title -->
<div class="text-center mb-6">

<div class="text-6xl text-primaryColor dark:text-white mb-3">
<i class="fa-solid fa-user-circle"></i>
</div>

<h2 id="loginTitle" class="text-2xl font-bold text-primaryColor dark:text-white">
ورود به سیستم صرافی هوشمند
</h2>

</div>

<form class="space-y-5">

<!-- Username -->
<div>

<label id="userLabel"
class="block mb-1 text-gray-600 dark:text-gray-300">
نام کاربری
</label>

<div class="relative">

<input type="text"
class="w-full border rounded-lg px-4 py-2 pr-10 focus:ring-2 focus:ring-primaryColor outline-none dark:bg-slate-700 dark:text-white">

<i class="fa-solid fa-user absolute right-3 top-3 text-gray-400"></i>

</div>

</div>

<!-- Password -->
<div>

<label id="passLabel"
class="block mb-1 text-gray-600 dark:text-gray-300">
رمز عبور
</label>

<div class="relative">

<input id="passwordInput"
type="password"
class="w-full border rounded-lg px-4 py-2 pr-10 focus:ring-2 focus:ring-primaryColor outline-none dark:bg-slate-700 dark:text-white">

<i id="passwordIcon"
onclick="togglePassword()"
class="fa-solid fa-eye absolute right-3 top-3 cursor-pointer text-gray-400"></i>

</div>

</div>

<!-- Remember -->
<div class="flex justify-between text-sm">

<label class="flex items-center gap-2">

<input type="checkbox">

<span id="rememberText"
class="text-primaryColor dark:text-white">
مرا به خاطر بسپار
</span>

</label>

<a id="forgotText"
href="#"
class="text-primaryColor dark:text-white">
رمز عبور خود را فراموش کرده‌اید؟
</a>

</div>

<button
class="w-full bg-primaryColor hover:bg-primaryColorLight text-white py-2 rounded-lg font-semibold transition">
<a href="dashboard.html" id="loginBtn">ورود</a>
<!-- <span id="loginBtn">ورود</span> -->

</button>

</form>

<p class="text-center mt-6 text-sm text-primaryColor dark:text-white">
Developed By: <span class="font-semibold">Arif Roohany</span>
</p>

</div>

</div>

<script src="main.js"></script>

</body>
</html>
