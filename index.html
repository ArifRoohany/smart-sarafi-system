<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>
<link rel="stylesheet" href="css/main.css">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="bg-blue-100 min-h-screen flex items-center justify-center">

<div class="relative">

<!-- Card -->
<div class="bg-white rounded-[40px] shadow-xl w-[360px] pt-16 pb-0 overflow-hidden">

<!-- Avatar -->
<div class="absolute left-1/2 -translate-x-1/2 -top-12">

<div class="w-24 h-24 bg-primary rounded-full flex items-center justify-center">

<i class="fa-solid fa-user text-white text-4xl"></i>

</div>

</div>

<div class="px-8 pb-6">

<!-- Email -->
<div class="flex items-center gap-3 mb-4">

<span class="text-primary text-xl">
<i class="fa-solid fa-envelope"></i>
</span>

<input
type="email"
placeholder="Email"
class="flex-1 bg-blue-100 text-primary placeholder-primary px-4 py-2 rounded-full outline-none"
/>

</div>

<!-- Password -->
<div class="flex items-center gap-3 mb-5">

<span class="text-primary text-xl">
<i class="fa-solid fa-lock"></i>
</span>

<input
type="password"
placeholder="Password"
class="flex-1 bg-blue-100 text-primary placeholder-primary px-4 py-2 rounded-full outline-none"
/>

</div>

<!-- Remember / Forgot -->
<div class="flex justify-between items-center text-sm text-primary mb-6">

<label class="flex items-center gap-2">

<input type="checkbox" class="bg-primary">

Remember me

</label>

<a href="#" class="hover:underline">
Forgot Password?
</a>

</div>

</div>

<!-- LOGIN Button -->
<a href="dashboard.html">
    <button class="w-full bg-primary text-white text-xl font-bold py-4">

LOGIN

</button>
</a>

</div>

</div>

</body>
</html>
