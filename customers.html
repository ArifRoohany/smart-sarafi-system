<!DOCTYPE html>
<html lang="fa" dir="rtl" class="font-poppins">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customers | Smart Sarafi</title>

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.active-link{
background-color:hsl(209,87%,40%);
color:white;
}
</style>
</head>

<body class="bg-sectionColor min-h-screen">

<div class="flex min-h-screen">

<!-- Sidebar -->
<aside class="w-64 bg-white p-6 flex flex-col">

<img src="images/logo.png" width="200">

<nav class="flex flex-col gap-4 mt-10 text-gray-800">

<a href="dashboard.html" class="flex items-center gap-3 p-3 rounded hover:bg-primaryColorLight hover:text-white transition">
<i class="fa-solid fa-chart-line"></i>
<span>داشبورد</span>
</a>

<a href="customers.html" class="flex items-center gap-3 p-3 rounded active-link">
<i class="fa-solid fa-users"></i>
<span>کاربران</span>
</a>

<a href="transactions.html" class="flex items-center gap-3 p-3 rounded hover:bg-primaryColorLight hover:text-white transition">
<i class="fa-solid fa-money-bill-transfer"></i>
<span>تراکنش‌ها</span>
</a>

<a href="#" class="flex items-center gap-3 p-3 rounded hover:bg-primaryColorLight hover:text-white transition">
<i class="fa-solid fa-gear"></i>
<span>تنظیمات</span>
</a>

</nav>
</aside>

<!-- Main -->
<main class="flex-1 p-6">

<!-- Navbar -->
<div class="flex justify-between items-center mb-6">

<h1 class="text-2xl font-semibold text-primaryColor">
مدیریت کاربران
</h1>

<button class="flex items-center gap-2 border border-gray-300 text-primaryColor bg-white px-4 py-2 rounded-lg shadow">
<i class="fa-solid fa-right-from-bracket"></i>
خروج
</button>

</div>

<!-- Cards -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">

<div class="bg-white p-5 rounded-2xl shadow flex justify-between">
<div>
<h2 class="text-primaryColor">کل کاربران</h2>
<p class="text-2xl font-bold text-primaryColor">120</p>
</div>
<i class="fa-solid fa-users text-3xl text-primaryColor"></i>
</div>

<div class="bg-white p-5 rounded-2xl shadow flex justify-between">
<div>
<h2 class="text-primaryColor">فعال</h2>
<p class="text-2xl font-bold text-primaryColor">98</p>
</div>
<i class="fa-solid fa-user-check text-3xl text-green-500"></i>
</div>

<div class="bg-white p-5 rounded-2xl shadow flex justify-between">
<div>
<h2 class="text-primaryColor">امروز</h2>
<p class="text-2xl font-bold text-primaryColor">5</p>
</div>
<i class="fa-solid fa-user-plus text-3xl text-purple-500"></i>
</div>

<div class="bg-white p-5 rounded-2xl shadow flex justify-between">
<div>
<h2 class="text-primaryColor">VIP</h2>
<p class="text-2xl font-bold text-primaryColor">8</p>
</div>
<i class="fa-solid fa-star text-3xl text-yellow-500"></i>
</div>

</div>

<!-- Chart -->
<div class="bg-white p-5 rounded-2xl shadow mb-6" style="height:300px;">
<canvas id="customerChart"></canvas>
</div>

<!-- Search + Add -->
<div class="flex flex-col md:flex-row md:justify-between gap-4 mb-6">

<div class="relative w-full md:w-80">

<input type="text"
placeholder="جستجوی کاربر..."
id="customerSearch"
class="w-full border border-gray-300 rounded-lg px-4 py-2 pr-10 focus:outline-none focus:ring-2 focus:ring-primaryColor text-sm">

<i class="fa-solid fa-magnifying-glass absolute top-1/2 transform -translate-y-1/2 right-3 text-gray-400"></i>

</div>

<button id="addCustomerBtn"
class="bg-primaryColor hover:bg-primaryColorLight text-white px-5 py-2 rounded-lg flex items-center gap-2">

<i class="fa-solid fa-user-plus"></i>
افزودن کاربر

</button>

</div>

<!-- Table -->
<div class="bg-white rounded-sm shadow overflow-x-auto">

<table class="min-w-full text-sm">

<thead class="bg-primaryColor text-whiteColor">

<tr>
<th class="px-6 py-3">ID</th>
<th class="px-6 py-3">نام</th>
<th class="px-6 py-3">شماره</th>
<th class="px-6 py-3">ارز</th>
<th class="px-6 py-3">موجودی</th>
<th class="px-6 py-3">وضعیت</th>
<th class="px-6 py-3">عملیات</th>
</tr>

</thead>

<tbody>

<tr class="border-b">

<td class="px-6 py-4 text-primaryColor">1</td>
<td class="px-6 py-4 text-primaryColor">Ahmad Khan</td>
<td class="px-6 py-4 text-primaryColor">070000000</td>
<td class="px-6 py-4 text-primaryColor">USD</td>
<td class="px-6 py-4 text-primaryColor">$2500</td>

<td class="px-6 py-4">

<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs">
Active
</span>

</td>

<td class="px-6 py-4 flex gap-3">

<button class="text-blue-500">
<i class="fa-solid fa-eye"></i>
</button>

<button class="text-green-500">
<i class="fa-solid fa-pen"></i>
</button>

<button class="text-red-500">
<i class="fa-solid fa-trash"></i>
</button>

</td>

</tr>

</tbody>

</table>

</div>

<!-- Modal -->
<div id="addCustomerModal"
class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">

<div class="bg-white rounded-xl w-96 p-6 shadow-lg">

<h2 class="text-xl font-semibold mb-4 text-primaryColor">
افزودن کاربر جدید
</h2>

<form id="customerForm" class="flex flex-col gap-4">

<input type="text" placeholder="نام"
class="w-full px-4 py-2 rounded-lg border border-gray-300">

<input type="text" placeholder="شماره"
class="w-full px-4 py-2 rounded-lg border border-gray-300">

<input type="text" placeholder="ارز"
class="w-full px-4 py-2 rounded-lg border border-gray-300">

<input type="text" placeholder="موجودی"
class="w-full px-4 py-2 rounded-lg border border-gray-300">

<select class="w-full px-4 py-2 rounded-lg border border-gray-300">

<option>فعال</option>
<option>غیرفعال</option>
<option>VIP</option>

</select>

<div class="flex justify-end gap-3 mt-4">

<button type="button" id="closeModal"
class="px-4 py-2 rounded-lg border border-gray-300 text-primaryColor">

بستن

</button>

<button type="submit"
class="bg-primaryColor hover:bg-primaryColorLight text-white px-4 py-2 rounded-lg">

ذخیره

</button>

</div>

</form>

</div>

</div>

</main>
</div>

<script src="main.js"></script>

</body>
</html>
